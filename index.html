<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LovelyProga | Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-color: #ffffff;
            --accent-color: #9d72da; /* Сменил на чуть более фиолетовый для стиля */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Увеличенный контейнер */
        .container {
            text-align: center;
            padding: 60px 50px; /* Увеличены отступы */
            border-radius: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 450px; /* Увеличенная ширина (было 350px) */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: fadeIn 1.2s ease-out;
        }

        .avatar {
            width: 130px; /* Увеличенная аватарка */
            height: 130px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 3px solid var(--accent-color);
            padding: 5px;
            object-fit: cover;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar:hover {
            transform: rotate(5deg) scale(1.1);
        }

        .nickname {
            font-size: 2.2rem; /* Увеличенный шрифт */
            margin-bottom: 35px;
            display: inline-block;
            letter-spacing: 1px;
        }

        .nickname span {
            display: inline-block;
            animation: wave 2.5s infinite ease-in-out;
        }

        /* Генерация задержки для волны */
        .nickname span:nth-child(1) { animation-delay: 0.1s; }
        .nickname span:nth-child(2) { animation-delay: 0.2s; }
        .nickname span:nth-child(3) { animation-delay: 0.3s; }
        .nickname span:nth-child(4) { animation-delay: 0.4s; }
        .nickname span:nth-child(5) { animation-delay: 0.5s; }
        .nickname span:nth-child(6) { animation-delay: 0.6s; }
        .nickname span:nth-child(7) { animation-delay: 0.7s; }
        .nickname span:nth-child(8) { animation-delay: 0.8s; }
        .nickname span:nth-child(9) { animation-delay: 0.9s; }
        .nickname span:nth-child(10) { animation-delay: 1.0s; }
        .nickname span:nth-child(11) { animation-delay: 1.1s; }

        @keyframes wave {
            0%, 100% { transform: translateY(0); filter: blur(0); }
            50% { transform: translateY(-10px); color: var(--accent-color); filter: drop-shadow(0 0 5px var(--accent-color)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 35px; /* Больше расстояние между иконками */
        }

        .social-icon {
            font-size: 2rem; /* Увеличенные иконки */
            color: var(--text-color);
            text-decoration: none;
            transition: 0.3s;
            position: relative;
        }

        .social-icon:hover {
            color: var(--accent-color);
            transform: translateY(-5px);
        }

        /* Тултип (подпись) */
        .social-icon::after {
            content: attr(data-name);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .social-icon:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Аватарка -->
        <img src="https://raw.githubusercontent.com/TEMACHIK/TextureMiniblox/refs/heads/main/unnamed.png" alt="Avatar" class="avatar">

        <!-- Ник LovelyProga -->
        <div class="nickname">
            <span>L</span><span>o</span><span>v</span><span>e</span><span>l</span><span>y</span><span>P</span><span>r</span><span>o</span><span>g</span><span>a</span>
        </div>

        <!-- Кнопки -->
        <div class="social-links">
            <a href="https://discord.com/users/1298585090011430944" target="_blank" class="social-icon" data-name="Discord">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://github.com/Lovely-proga" target="_blank" class="social-icon" data-name="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>
    </div>

</body>
</html>
